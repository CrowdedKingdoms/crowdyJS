query AppBySlug($orgSlug: String!, $appSlug: String!) {
  appBySlug(orgSlug: $orgSlug, appSlug: $appSlug) {
    appId
    orgId
    name
    slug
    description
    visibility
    status
    metadata
    splitMode
    gameApiUrl
    createdAt
    updatedAt
    org {
      orgId
      slug
      name
    }
  }
}
