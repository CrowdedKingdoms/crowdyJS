"""
BigInt custom scalar type. Input should be a string representation of a BigInt.
"""
scalar BigInt

type Query {
  me: User
  user(id: BigInt!): User
  myDonationData: UserDonationData!
  myPropertyTokens: UserPropertyTokenData!
  freePlayWindowInfo: FreePlayWindowInfo!
  """
  Super admin only. Paginated user search; replaces the old `users`/`usersByGamertag`/`usersByEmail` triple. `query` is matched ILIKE-prefix against email, gamertag, disambiguation, and exact user_id.
  """
  usersPaginated(query: String, limit: Int = 50, offset: Int = 0): UsersPage!
  organization(id: BigInt!): Organization
  organizationBySlug(slug: String!): Organization
  myOrganizations: [OrgMembership!]!
  """
  The full seed list of permission keys. Used by the UI to render role editors.
  """
  orgPermissions: [OrgPermission!]!
  orgMembers(orgId: BigInt!): [OrgMember!]!
  orgRoles(orgId: BigInt!): [OrgRole!]!
  memberRoles(orgMemberId: BigInt!): [OrgRole!]!
  orgTokens(orgId: BigInt!): [OrgToken!]!
  """
  Public marketplace listing. Returns visibility=PUBLIC + status=LIVE only. No auth required.
  """
  apps(filter: AppMarketplaceFilterInput, limit: Int = 50, offset: Int = 0): AppsPage!
  appBySlug(orgSlug: String!, appSlug: String!): App
  app(appId: BigInt!): App
  """Apps the caller can see: org member OR active app_user_access."""
  myApps: [App!]!
  appsForOrg(orgSlug: String!): [App!]!
  """
  Public listing of access tiers for an app. Used by the marketplace app detail page.
  """
  appAccessTiers(appId: BigInt!): [AppAccessTier!]!
  """
  Runtime permission keys that can be granted through app tiers or grid permissions.
  """
  runtimePermissions: [String!]!
  myAppAccess(appId: BigInt!): AppUserAccess
  appUserAccessByApp(appId: BigInt!, status: String, limit: Int = 50, offset: Int = 0): [AppUserAccess!]!
  walletBalance(orgId: BigInt!): OrgWallet!
  walletTransactions(orgId: BigInt!, limit: Int, offset: Int): [WalletTransaction!]!
  appBudget(orgId: BigInt!, appId: BigInt!): AppBudget
  appBudgets(orgId: BigInt!): [AppBudget!]!
  quotasForOrg(orgId: BigInt!): [ServiceQuota!]!
  quotasForApp(appId: BigInt!): [ServiceQuota!]!
  """
  The most-specific quota that applies to (orgId, appId, tierId, metric). Walks tier -> app -> org -> free_tier_defaults. Returns null if nothing matches.
  """
  effectiveQuota(metric: String!, orgId: BigInt, appId: BigInt, tierId: BigInt): ServiceQuota
  myCheckouts(limit: Int = 50, offset: Int = 0): CheckoutsPage!
  """Super admin only. Cross-tenant payments audit."""
  checkouts(filter: CheckoutFilterInput, limit: Int = 50, offset: Int = 0): CheckoutsPage!
  """Super admin only. Inbound payment webhook audit log."""
  paymentEvents(limit: Int = 50, offset: Int = 0): PaymentEventsPage!
  orgEnvironments(orgId: BigInt!): [CksEnvironment!]!
  orgEnvironment(orgId: BigInt!, slug: String!): CksEnvironmentDetail
  environmentVersions: [CksEnvironmentVersion!]!
  """
  OVH datacenters that have at least one customer-priced instance flavor available for customer selection.
  """
  environmentDatacenters: [CksOvhDatacenter!]!
  """
  Customer-selectable instance flavors in the datacenter with current availability and customer pricing.
  """
  environmentFlavors(datacenter: String!): [CksOvhFlavor!]!
  """
  Pricing quote for the selected flavors. Fails if any flavor is unavailable, hidden, or lacks customer pricing.
  """
  environmentQuote(input: EnvironmentQuoteInput!): CksEnvironmentQuote!
  gridUserPermissions(appId: BigInt!, gridId: BigInt!, userId: BigInt!): GridUserPermissions!
  nearbyGridPermissions(input: NearbyGridPermissionsInput!): [NearbyGridPermissions!]!
  """Returns all registered GraphQL servers"""
  graphqlServers: [GraphQLServer!]!
  """Returns only active (ReadyForClients) GraphQL servers"""
  activeGraphQLServers: [GraphQLServer!]!
  """
  Returns version information for the server and minimum client version requirements
  """
  versionInfo: ServerVersionInfo!
  cpEnvironments(page: Int! = 1, pageSize: Int! = 50): CpAdminEnvironmentsPage!
  cpEnvironment(slug: String!): CpAdminEnvironment
  cpChangeOrders(environmentId: String, page: Int! = 1, pageSize: Int! = 50): CpChangeOrdersPage!
  cpChangeOrder(id: String!): CpChangeOrderDetail
  cpAudit(environmentId: String, limit: Int! = 200): [CpAuditEntry!]!
  cpSecrets(environmentId: String): [CpSecretRow!]!
  cpEnvSecrets(environmentId: String): [CpEnvSecretRow!]!
  operatorUsers: [CpOperatorUser!]!
  userAvatars(userId: BigInt!): [Avatar!]!
  avatar(id: BigInt!): Avatar!
  actor(uuid: String!): Actor!
  actors(filter: ActorFilterInput): [Actor!]!
  batchLookupActors(input: BatchActorLookupInput!): [Actor!]!
  userAppState(appId: BigInt!): UserAppState
  userAppStates: [UserAppState!]!
  myAvatars: [AvatarDTO!]!
  """
  Returns a random server from the lowest 20% of servers by client count to distribute load evenly
  """
  serverWithLeastClients: ServerStatus!
  getChunk(input: GetChunkInput!): Chunk
  getChunkLods(input: GetChunkLodsInput!): ChunkLodsResponse
  getVoxelList(input: GetVoxelListInput!): ChunkVoxelResponse!
  getChunksByDistance(input: GetChunksByDistanceInput!): ChunksByDistanceResponse!
  listVoxels(input: ListVoxelsInput!): [Voxel!]!
  listVoxelUpdatesByDistance(input: ListVoxelUpdatesByDistanceInput!): VoxelUpdatesByDistanceResponse!
  voxelUpdateHistory(appId: BigInt!, userId: BigInt, from: DateTime, to: DateTime, limit: Int, offset: Int): [VoxelUpdateHistoryEvent!]!
  """
  UDP proxy session status for the game token on this request. Without a game token, returns connected: false. Does not open a session—use udpNotifications or connectUdpProxy.
  """
  udpProxyConnectionStatus: UdpProxyConnectionStatus!
  """
  Single startup payload for browser game clients: current user, version requirements, UDP proxy status, realtime protocol details, and spatial send limits.
  """
  gameClientBootstrap(appId: BigInt!): GameClientBootstrap!
}

input AppMarketplaceFilterInput {
  query: String
  orgSlug: String
}

input CheckoutFilterInput {
  provider: PaymentProvider
  purpose: CheckoutPurpose
  status: CheckoutStatus
  userId: BigInt
  orgId: BigInt
  appId: BigInt
}

input EnvironmentQuoteInput {
  orgId: BigInt!
  datacenter: String!
  """
  Flavor name from environmentFlavors(datacenter); must have a published hourly price.
  """
  databaseFlavor: String!
  """
  Flavor name from environmentFlavors(datacenter) for per-tenant game-api VMs; must have a published hourly price.
  """
  gameApiFlavor: String!
  """
  Flavor name from environmentFlavors(datacenter); must have a published hourly price.
  """
  udpBuddyFlavor: String!
  """
  Flavor name from environmentFlavors(datacenter) for the Caddy LB VMs in front of the game-api fleet; must have a published hourly price.
  """
  caddyFlavor: String!
  gameApiMinServers: Int!
  gameApiMaxServers: Int!
  udpBuddyMinServers: Int!
  udpBuddyMaxServers: Int!
  loadBalancerCount: Int!
}

input NearbyGridPermissionsInput {
  appId: BigInt!
  userId: BigInt!
  lowChunk: ChunkCoordinatesInput!
  highChunk: ChunkCoordinatesInput!
}

input ChunkCoordinatesInput {
  x: BigInt!
  y: BigInt!
  z: BigInt!
}

type Mutation {
  login(loginUserInput: LoginUserInput!): AuthResponse!
  register(registerUserInput: RegisterUserInput!): AuthResponse!
  confirmEmail(token: String!): Boolean!
  requestPasswordReset(email: String!): Boolean!
  resetPassword(resetPasswordInput: ResetPasswordInput!): Boolean!
  resendConfirmationEmail(email: String!): Boolean!
  logout: Boolean!
  changePassword(currentPassword: String!, newPassword: String!): Boolean!
  logoutAllDevices: Boolean!
  updateGamertag(input: UpdateGamertagInput!): User!
  setSuperAdmin(userId: BigInt!, value: Boolean!): User!
  """
  Super-admin only. Flip users.is_operator to grant or revoke control-plane / operator access.
  """
  setOperator(userId: BigInt!, value: Boolean!): User!
